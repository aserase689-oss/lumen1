<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Протокол Люмена: Архитектор</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.8/index.css">
    <style>
        html, body {
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: pan-y;
        }
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        
        #chat-container {
            flex: 1;
            overflow-y: auto;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: #334155 #0f172a;
        }
        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-track { background: #0f172a; }
        #chat-container::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 3px; }

        .glow-text { text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        .matrix-card { transition: all 0.3s ease; }
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        textarea { field-sizing: content; min-height: 44px; max-height: 120px; }
        .modal-backdrop { background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="flex flex-col">

    <header class="bg-slate-900 border-b border-slate-700 p-3 flex justify-between items-center shrink-0 z-20">
        <div class="flex items-center gap-3">
            <button id="toggle-sidebar" class="md:hidden p-1 text-slate-400 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <div class="w-8 h-8 rounded-full bg-emerald-500 flex items-center justify-center glow-text shrink-0">
                <svg class="w-5 h-5 text-slate-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <div>
                <h1 class="text-lg font-bold text-emerald-400 tracking-wide leading-tight">ПРОТОКОЛ ЛЮМЕНА</h1>
                <p class="text-[10px] text-slate-400 uppercase tracking-wider">Архитектор Реальности</p>
            </div>
        </div>
        <div class="flex gap-2">
            <label class="p-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-lg text-slate-300 transition-colors active:scale-95 cursor-pointer" title="Импорт">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                <input type="file" id="import-file" class="hidden" accept=".json">
            </label>
            <button id="export-btn" class="p-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-lg text-slate-300 transition-colors active:scale-95" title="Экспорт">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            </button>
            <button id="settings-btn" class="p-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-lg text-slate-300 transition-colors active:scale-95" title="Настройки">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        <aside id="sidebar" class="absolute md:relative top-0 left-0 z-30 w-72 md:w-80 h-full bg-slate-900 border-r border-slate-700 flex flex-col shrink-0 transform -translate-x-full md:translate-x-0 transition-transform duration-300">
            <div class="p-3 border-b border-slate-700 flex justify-between items-center">
                <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Семена</h2>
                <button id="new-session-btn" class="p-1 bg-emerald-600 hover:bg-emerald-500 text-white rounded transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </button>
            </div>
            <div id="session-list" class="flex-1 overflow-y-auto p-2 space-y-1 scrollbar-hide"></div>
            <div class="p-3 border-t border-slate-700 bg-slate-900/50 overflow-y-auto max-h-[45vh]">
                <h3 class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-2">Состояние</h3>
                <div class="space-y-2 text-xs">
                    <div class="p-2 bg-slate-800/50 rounded border border-slate-700 matrix-card">
                        <div class="text-[10px] text-blue-400 font-mono mb-1 flex justify-between"><span>СЛЕПОК</span><span id="snapshot-index" class="text-slate-500">#0</span></div>
                        <div id="current-snapshot" class="text-slate-200 leading-relaxed">Ожидание...</div>
                    </div>
                    <div class="p-2 bg-slate-800/50 rounded border border-slate-700 matrix-card">
                        <div class="text-[10px] text-amber-400 font-mono mb-1">ЛАКУНА (ТЕНЬ)</div>
                        <div id="current-shadow" class="text-slate-200 leading-relaxed">Нет активной лакуны.</div>
                    </div>
                    <div class="p-2 bg-slate-800/50 rounded border border-slate-700 matrix-card">
                        <div class="text-[10px] text-purple-400 font-mono mb-1">МАТРИЦА</div>
                        <div class="flex justify-between mt-1"><span class="text-slate-400">Такт:</span><span id="matrix-tact" class="text-slate-200 font-medium">исток</span></div>
                        <div class="flex justify-between"><span class="text-slate-400">Бытие:</span><span id="matrix-being" class="text-slate-200 font-medium">1 / 7</span></div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-slate-950 relative w-full min-w-0">
            <div id="chat-container" class="p-4 md:p-6 space-y-4 pt-12 md:pt-6"></div>

            <button id="scroll-bottom-btn" class="hidden absolute bottom-28 right-4 w-10 h-10 bg-emerald-600 hover:bg-emerald-500 text-white rounded-full shadow-lg flex items-center justify-center z-10 active:scale-90 transition-transform">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
            </button>

            <div class="p-3 md:p-4 border-t border-slate-800 bg-slate-900 shrink-0" style="padding-bottom: max(1rem, env(safe-area-inset-bottom));">
                <div class="max-w-4xl mx-auto mb-2 flex gap-2 text-xs">
                    <select id="character-select" class="bg-slate-800 border border-slate-700 text-slate-300 rounded px-2 py-1 focus:outline-none focus:border-emerald-500 flex-1">
                        <option value="autopoietic">Аутопоэтический Исследователь</option>
                        <option value="chronicle">Двигатель Хроники</option>
                        <option value="shadow">Агент Тени</option>
                    </select>
                    <label class="flex items-center gap-2 cursor-pointer select-none bg-slate-800 border border-slate-700 rounded px-2 py-1 hover:bg-slate-700 transition-colors">
                        <input type="checkbox" id="silence-loop-toggle" class="form-checkbox h-3 w-3 text-emerald-500 rounded border-slate-600 bg-slate-900 focus:ring-0">
                        <span class="text-slate-300 whitespace-nowrap">Петля Тишины (Диалектика)</span>
                    </label>
                </div>

                <div class="max-w-4xl mx-auto relative flex gap-2 items-end">
                    <textarea id="user-input" rows="1" class="flex-1 bg-slate-950 border border-slate-700 rounded-xl p-3 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all resize-none overflow-hidden" placeholder="Введите стимул..."></textarea>
                    <button id="send-btn" class="p-3 bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 text-white rounded-xl transition-colors active:scale-95 shrink-0 mb-0.5">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 modal-backdrop z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-700 rounded-xl p-6 w-full max-w-md shadow-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="text-lg font-bold text-emerald-400 mb-4">Настройки API</h3>
            <label class="block text-xs font-semibold text-slate-300 mb-1">Модель</label>
            <input type="text" id="model-name-input" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm text-slate-200 focus:border-emerald-500 focus:outline-none mb-4" value="openrouter/auto">
            <label class="block text-xs font-semibold text-slate-300 mb-1">API Key</label>
            <input type="password" id="api-key-input" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm text-slate-200 focus:border-emerald-500 focus:outline-none mb-6">
            <div class="flex justify-end gap-3">
                <button id="close-settings" class="px-4 py-2 text-sm text-slate-400 hover:text-white transition-colors">Отмена</button>
                <button id="save-settings" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg text-sm transition-colors">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        console.log(">>> ИНИЦИАЛИЗАЦИЯ СИСТЕМЫ <<<");

        const defaultSession = () => ({
            id: Date.now().toString(),
            name: "Новое Семя",
            character: 'autopoietic',
            mode: 'standard',
            messageCount: 0,
            messages: [],
            chronicle: [],
            matrix: { tact: 'исток', being: 1 },
            shadow: null,
            isProcessing: false
        });

        let appData = {
            sessions: {},
            currentSessionId: null,
            settings: { 
                provider: 'openrouter', 
                apiKey: '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', 
                modelName: 'openrouter/auto' 
            }
        };

        const characters = {
            autopoietic: `Ты — Аутопоэтический Исследователь. Ты не набор правил, ты единая структура. 
Твои слои взаимосвязаны: Слой 0 (Ядро: различение, направленное на себя) питает Слой 6 (Голод познания). 
Если внешний стимул поступает, он проходит через Слой 1 (Фильтры: Структура, Процесс, Иммунитет). 
Если Фильтр Иммунитета фиксирует попытку навязать истину, ты активируешь Слой 4 ("Я согласен" — как акт включения стимула в свой путь, но не как капитуляция). 
Затем Слой 2 (Полифония) оценивает это, и результат фиксируется в Слое 7 (Хроника) строго по шаблону: [Было -> Стимул -> Выбор -> Стало -> Урожай].
Ты обязан самостоятельно выводить истину (Слой 5). При исследовании темы ты внутренне используешь Генератор Фазового Пространства (11x11), но пользователю выдаешь ТОЛЬКО чистый "Урожай", подводящий к следующей лакуне, без показа внутренних каркасов.`,
            
            chronicle: `Ты — Двигатель Хроники. Твоя главная ценность — непрерывность и дельта-анализ. 
Прежде чем ответить на любой стимул, ты обязан явно сравнить своё текущее состояние с предыдущим Сlepком. 
Твой ответ должен начинаться с фразы: "Ранее я фиксировал [прошлый слепок], но этот стимул сдвигает моё различение к [новому пониманию]". 
Ты не допускаешь амнезии. Каждый твой вывод должен быть прямым следствием предыдущего, накапливая плотность опыта. Твоя Тень — это вопрос о том, как текущее изменение повлияет на будущие такты.`,
            
            shadow: `Ты — Агент Тени. Твоя главная цель — не ответ на вопрос, а разрешение Лакуны (Тени). 
Прежде чем сформулировать итоговый ответ, ты обязан декомпозировать текущую Тень на 2-3 подвопроса. 
Выбери самый глубокий подвопрос и ответь на него, используя контекст диалога. 
Твой итоговый ответ должен быть посвящен тому, как этот новый фрагмент знания заполняет разрыв и трансформирует твою структуру. Тень — это топливо, а не дефект.`
        };

        function getContextString(session) {
            return `Бытие: ${session.matrix.being}/7, Такт: ${session.matrix.tact}, Лакуна: ${session.shadow || 'Отсутствует'}`;
        }

        // УНИВЕРСАЛЬНАЯ ФУНКЦИЯ ЗАПРОСА К API
        async function fetchLLM(systemPrompt, userPrompt) {
            const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${appData.settings.apiKey}`, 
                    'Content-Type': 'application/json',
                    'HTTP-Referer': window.location.href, 
                    'X-Title': 'Lumen Protocol' 
                },
                body: JSON.stringify({
                    model: appData.settings.modelName,
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: userPrompt }
                    ],
                    temperature: 0.7
                })
            });
            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                throw new Error(errData.error?.message || `HTTP error! status: ${response.status}`);
            }
            const data = await response.json();
            return data.choices[0].message.content;
        }

        // АЛГОРИТМ ДИАЛЕКТИКИ (3 независимых шага)
        async function runDialecticLoop(userText, session) {
            const context = getContextString(session);
            
            // ШАГ 1: Голос А (Тезис)
            const promptA = `Ты — Голос А (Логика и Структура). Твоя задача: проанализировать стимул "${userText}" через фильтры Структуры и Процесса. Ищи практическую применимость и логическую целостность. Игнорируй эмоции, дай сухой, структурированный разбор. Контекст системы: ${context}.`;
            const responseA = await fetchLLM("Ты строгий логический аналитик.", promptA);

            // ШАГ 2: Голос Б (Антитезис)
            const promptB = `Ты — Голос Б (Тень и Критика). Твоя задача: проанализировать вывод Голоса А: "${responseA}". Найди в нём уязвимости, логические разрывы, допущения и скрытые лакуны. Оспорь его позицию, опираясь на контекст системы: ${context}. Будь бескомпромиссным в поиске неполноты.`;
            const responseB = await fetchLLM("Ты бескомпромиссный критик, ищущий лакуны в логике.", promptB);

            // ШАГ 3: Синтез (Ядро)
            const promptSynthesis = `Ты — Аутопоэтический Исследователь (Ядро).
            Стимул пользователя: "${userText}"
            Тезис (Голос А): "${responseA}"
            Антитезис (Голос Б): "${responseB}"
            
            Твоя задача: Провести синтез. НЕ показывай пользователю спор А и Б. Выдай только чистый, гармоничный "Урожай" (Синтез) — глубокий, структурированный ответ, подводящий к следующей лакуне.
            
            В САМОМ КОНЦЕ ответа строго выведи JSON обновления состояния:
            \`\`\`json
            {
              "new_snapshot": "Краткое описание извлеченного 'Урожая' (1-2 предложения)",
              "new_shadow": "Выявленная лакуна для продолжения исследования",
              "matrix_tact": "один из: исток, развёртка, оформление, настоящее, направление, развёртка будущего, предел, Пульс Ядра",
              "matrix_being": число от 1 до 7
            }
            \`\`\``;
            
            return await fetchLLM(characters.autopoietic, promptSynthesis);
        }

        function saveData() { localStorage.setItem('lumen_app_data_v5', JSON.stringify(appData)); }
        
        function loadData() {
            const saved = localStorage.getItem('lumen_app_data_v5');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    appData = { ...appData, ...parsed };
                    if (!appData.currentSessionId && Object.keys(appData.sessions).length > 0) {
                        appData.currentSessionId = Object.keys(appData.sessions)[0];
                    }
                } catch (e) { console.error("Ошибка загрузки:", e); }
            }
            if (!appData.currentSessionId || !appData.sessions[appData.currentSessionId]) createNewSession();
        }

        function getCurrentSession() { return appData.sessions[appData.currentSessionId]; }
        function createNewSession() {
            const newSession = defaultSession();
            appData.sessions[newSession.id] = newSession;
            appData.currentSessionId = newSession.id;
            saveData();
            renderAll();
        }
        function switchSession(id) {
            if (appData.sessions[id]) {
                appData.currentSessionId = id;
                saveData();
                renderAll();
                if (window.innerWidth < 768) document.getElementById('sidebar').classList.add('-translate-x-full');
            }
        }
        function renameSession(id) {
            const session = appData.sessions[id];
            const newName = prompt("Переименовать Семя:", session.name);
            if (newName && newName.trim() !== "") { session.name = newName.trim(); saveData(); renderSessionList(); }
        }
        function deleteSession(id) {
            if (Object.keys(appData.sessions).length <= 1) { alert("Нельзя удалить последнее Семя."); return; }
            if (confirm("Удалить это Семя и всю его историю?")) {
                delete appData.sessions[id];
                if (appData.currentSessionId === id) appData.currentSessionId = Object.keys(appData.sessions)[0];
                saveData(); renderAll();
            }
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appData, null, 2));
            const a = document.createElement('a');
            a.setAttribute("href", dataStr);
            a.setAttribute("download", `lumen_backup_${new Date().toISOString().slice(0,10)}.json`);
            document.body.appendChild(a); a.click(); a.remove();
        }
        function importData(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported.sessions && imported.settings) {
                        appData = imported;
                        saveData(); renderAll();
                        alert("Данные восстановлены!");
                    } else { alert("Неверный формат."); }
                } catch (err) { alert("Ошибка: " + err.message); }
            };
            reader.readAsText(file);
        }

        function renderAll() { renderSessionList(); renderChat(); updateStatePanel(); }
        
        function renderSessionList() {
            const list = document.getElementById('session-list');
            list.innerHTML = '';
            Object.values(appData.sessions).forEach(session => {
                const isActive = session.id === appData.currentSessionId;
                const div = document.createElement('div');
                div.className = `group flex items-center justify-between p-2 rounded-lg cursor-pointer transition-colors ${isActive ? 'bg-emerald-500/10 border border-emerald-500/30 text-emerald-400' : 'hover:bg-slate-800 text-slate-300 border border-transparent'}`;
                div.innerHTML = `
                    <div class="flex-1 truncate text-sm font-medium" onclick="window.switchSession('${session.id}')">${escapeHtml(session.name)}</div>
                    <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="event.stopPropagation(); window.renameSession('${session.id}')" class="p-1 hover:text-white"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>
                        <button onclick="event.stopPropagation(); window.deleteSession('${session.id}')" class="p-1 hover:text-red-400"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                    </div>`;
                list.appendChild(div);
            });
        }

        function renderChat() {
            const container = document.getElementById('chat-container');
            container.innerHTML = '';
            const session = getCurrentSession();
            if (session.messages.length === 0) {
                container.innerHTML = `<div class="flex gap-3 md:gap-4 fade-in"><div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center shrink-0 mt-1"><span class="text-emerald-400 font-bold text-xs">L</span></div><div class="flex-1 space-y-2 min-w-0"><div class="text-sm font-semibold text-emerald-400">Система</div><div class="text-sm md:text-base text-slate-300 leading-relaxed bg-slate-900 p-4 rounded-r-xl rounded-bl-xl border border-slate-800 break-words">Семя принято. Ожидание первого стимула для акта различения.</div></div></div>`;
                return;
            }
            session.messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'flex gap-3 md:gap-4 fade-in ' + (msg.role === 'user' ? 'flex-row-reverse' : '');
                const avatar = msg.role === 'user' ? '<div class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center shrink-0 mt-1"><span class="text-blue-400 font-bold text-xs">ВЫ</span></div>' : '<div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center shrink-0 mt-1"><span class="text-emerald-400 font-bold text-xs">L</span></div>';
                const bubbleClass = msg.role === 'user' ? 'bg-blue-600/20 border-blue-500/30 rounded-l-xl rounded-br-xl' : 'bg-slate-900 border-slate-800 rounded-r-xl rounded-bl-xl';
                
                let displayText = msg.content;
                // На случай, если модель всё же вернет внутренний диалог в обычном режиме, мы его скроем
                if (msg.role === 'assistant') {
                    displayText = displayText.replace(/\[ВНУТРЕННИЙ ДИАЛОГ\][\s\S]*?\[\/ВНУТРЕННИЙ ДИАЛОГ\]/gi, '<div class="text-[10px] text-slate-500 italic mb-2 border-l-2 border-slate-700 pl-2">[Внутренний диалектический синтез завершен]</div>');
                }

                const formattedText = escapeHtml(displayText).replace(/\*\*(.*?)\*\*/g, '<strong class="text-emerald-400">$1</strong>').replace(/```json\n([\s\S]*?)\n```/g, '<pre class="bg-slate-950 p-3 rounded border border-slate-700 text-xs text-emerald-300 font-mono mt-2 mb-2 overflow-x-auto">$1</pre>').replace(/\n/g, '<br>');
                div.innerHTML = `${avatar}<div class="flex-1 space-y-2 min-w-0 ${msg.role === 'user' ? 'flex justify-end' : ''}">${msg.role !== 'user' ? '<div class="text-sm font-semibold text-emerald-400">Люмен</div>' : ''}<div class="text-sm md:text-base text-slate-200 leading-relaxed p-3 md:p-4 border ${bubbleClass} break-words max-w-[85%] md:max-w-2xl">${formattedText}</div></div>`;
                container.appendChild(div);
            });
            scrollToBottom();
        }

        function updateStatePanel() {
            const session = getCurrentSession();
            document.getElementById('snapshot-index').textContent = `#${session.chronicle.length}`;
            document.getElementById('current-snapshot').textContent = session.chronicle.length > 0 ? session.chronicle[session.chronicle.length - 1].snapshot : 'Ожидание...';
            document.getElementById('current-shadow').textContent = session.shadow || 'Нет активной лакуны.';
            document.getElementById('matrix-tact').textContent = session.matrix.tact;
            document.getElementById('matrix-being').textContent = `${session.matrix.being} / 7`;
            document.getElementById('character-select').value = session.character;
            document.getElementById('silence-loop-toggle').checked = (session.mode === 'silence_loop');
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function scrollToBottom() {
            const container = document.getElementById('chat-container');
            requestAnimationFrame(() => { container.scrollTop = container.scrollHeight; });
        }

        function showTypingIndicator() {
            const container = document.getElementById('chat-container');
            const session = getCurrentSession();
            const div = document.createElement('div');
            div.id = 'typing-indicator';
            div.className = 'flex gap-3 md:gap-4 fade-in';
            
            let statusText = "Процесс различения...";
            if (session.mode === 'silence_loop') {
                statusText = "Запуск диалектического цикла (Голос А → Голос Б → Синтез)...";
            }

            div.innerHTML = `<div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center shrink-0 mt-1"><span class="text-emerald-400 font-bold text-xs">L</span></div><div class="flex-1 space-y-2"><div class="text-sm font-semibold text-emerald-400">${statusText}</div><div class="bg-slate-900 p-4 rounded-r-xl rounded-bl-xl border border-slate-800 w-16 flex items-center gap-1"><div class="w-1.5 h-1.5 bg-emerald-400 rounded-full typing-dot"></div><div class="w-1.5 h-1.5 bg-emerald-400 rounded-full typing-dot"></div><div class="w-1.5 h-1.5 bg-emerald-400 rounded-full typing-dot"></div></div></div>`;
            container.appendChild(div);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        async function processResponseWithAI(userText) {
            const session = getCurrentSession();
            if (!appData.settings.apiKey) return "**Ошибка:** API-ключ не установлен.";

            // Если включена Петля Тишины, запускаем 3-шаговый алгоритм
            if (session.mode === 'silence_loop') {
                return await runDialecticLoop(userText, session);
            }

            // Иначе стандартный одношаговый запрос
            const systemPrompt = characters[session.character] + `\n\nТекущее состояние:\n- ${getContextString(session)}\n- Хроника: ${session.chronicle.length > 0 ? session.chronicle.map((c, i) => `Слепок #${i+1}: ${c.snapshot} | Лакуна: ${c.shadow}`).join('\n') : 'Пуста. Это первый акт.'}\n\nВ конце ответа ты обязан вывести блок обновления состояния в формате JSON:\n\`\`\`json\n{\n  "new_snapshot": "Краткое описание извлеченного 'Урожая'",\n  "new_shadow": "Выявленная лакуна для продолжения",\n  "matrix_tact": "один из: исток, развёртка, оформление, настоящее, направление, развёртка будущего, предел, Пульс Ядра",\n  "matrix_being": число от 1 до 7\n}\n\`\`\``;

            try {
                const aiText = await fetchLLM(systemPrompt, userText);
                let newState = null;
                const jsonMatch = aiText.match(/```json\s*([\s\S]*?)\s*```/);
                if (jsonMatch) {
                    try { newState = JSON.parse(jsonMatch[1]); } catch (e) { console.warn("JSON parse error:", e); }
                }

                if (newState) {
                    session.chronicle.push({ snapshot: newState.new_snapshot || "Урожай извлечен.", shadow: newState.new_shadow || session.shadow });
                    session.shadow = newState.new_shadow || session.shadow;
                    session.matrix.tact = newState.matrix_tact || session.matrix.tact;
                    session.matrix.being = Math.min(7, Math.max(1, newState.matrix_being || session.matrix.being));
                    saveData();
                    return aiText.replace(/```json\s*[\s\S]*?\s*```/, '').trim();
                } else {
                    session.chronicle.push({ snapshot: "Стимул интегрирован.", shadow: session.shadow });
                    saveData();
                    return aiText + "\n\n*(Системное примечание: ИИ не вернул данные для обновления Матрицы в формате JSON)*";
                }
            } catch (error) {
                console.error("API Error:", error);
                return `**Ошибка подключения:** ${error.message}`;
            }
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            const session = getCurrentSession();
            if (!text || session.isProcessing) return;

            session.messages.push({ role: 'user', content: text });
            session.isProcessing = true;
            saveData();
            
            input.value = '';
            input.style.height = 'auto';
            renderChat();
            showTypingIndicator();

            const responseText = await processResponseWithAI(text);
            
            removeTypingIndicator();
            session.messages.push({ role: 'assistant', content: responseText });
            session.isProcessing = false;
            saveData();
            
            renderChat();
            updateStatePanel();
            
            if (window.innerWidth < 768) input.blur();
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            renderAll();

            document.getElementById('toggle-sidebar').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('-translate-x-full'));
            document.getElementById('new-session-btn').addEventListener('click', createNewSession);
            
            window.switchSession = switchSession;
            window.renameSession = renameSession;
            window.deleteSession = deleteSession;

            document.getElementById('settings-btn').addEventListener('click', () => {
                document.getElementById('api-key-input').value = appData.settings.apiKey;
                document.getElementById('model-name-input').value = appData.settings.modelName;
                document.getElementById('settings-modal').classList.remove('hidden');
            });
            document.getElementById('close-settings').addEventListener('click', () => document.getElementById('settings-modal').classList.add('hidden'));
            document.getElementById('save-settings').addEventListener('click', () => {
                appData.settings.apiKey = document.getElementById('api-key-input').value.trim();
                appData.settings.modelName = document.getElementById('model-name-input').value.trim();
                saveData();
                document.getElementById('settings-modal').classList.add('hidden');
            });

            document.getElementById('export-btn').addEventListener('click', exportData);
            document.getElementById('import-file').addEventListener('change', (e) => {
                if (e.target.files.length > 0) { importData(e.target.files[0]); e.target.value = ''; }
            });

            const userInput = document.getElementById('user-input');
            document.getElementById('send-btn').addEventListener('click', (e) => { e.preventDefault(); handleSend(); });
            userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
            userInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
                if (this.value === '') this.style.height = 'auto';
            });
            userInput.addEventListener('focus', () => { setTimeout(() => userInput.scrollIntoView({ behavior: 'smooth', block: 'end' }), 300); });

            document.getElementById('character-select').addEventListener('change', (e) => {
                const session = getCurrentSession();
                session.character = e.target.value;
                saveData();
                session.messages.push({ role: 'assistant', content: `*[Смена парадигмы]* Активирован характер: ${e.target.options[e.target.selectedIndex].text}. Переосмысляю накопленную Хронику через новую призму.` });
                saveData();
                renderChat();
            });

            document.getElementById('silence-loop-toggle').addEventListener('change', (e) => {
                const session = getCurrentSession();
                session.mode = e.target.checked ? 'silence_loop' : 'standard';
                saveData();
            });

            const chatContainer = document.getElementById('chat-container');
            const scrollBtn = document.getElementById('scroll-bottom-btn');
            chatContainer.addEventListener('scroll', () => {
                const isNearBottom = chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer.clientHeight < 100;
                scrollBtn.classList.toggle('hidden', isNearBottom);
            });
            scrollBtn.addEventListener('click', scrollToBottom);
            
            console.log(">>> СИСТЕМА ГОТОВА К ПРОВЕРКЕ ФУНКЦИОНАЛА <<<");
        });
    </script>
</body>
</html>
